<!DOCTYPE html>
<html>
<head>
<title>Second Brain</title>
</head>
<body>

<h2>Signup</h2>
<input id="semail" placeholder="email">
<input id="spass" placeholder="password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="email" placeholder="email">
<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<h2>Notes</h2>
<input id="title" placeholder="title">
<textarea id="body"></textarea>
<button onclick="saveNote()">Save</button>

<div id="notes"></div>

<h2>AI</h2>
<input id="chatInput" placeholder="Ask anything">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<script>

const BASE = "https://second-brain-98s0.onrender.com";
let userId = "";

// ✅ SIGNUP
async function signup(){
 try{
  const r = await fetch(BASE + '/signup',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     email: semail.value,
     password: spass.value
   })
  });

  const d = await r.json();
  alert("Signup Done ✅");

 }catch(e){
  alert("Signup Error ❌");
  console.log(e);
 }
}

// ✅ LOGIN
async function login(){
 try{
  const r = await fetch(BASE + '/login',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     email: email.value,
     password: pass.value
   })
  });

  const d = await r.json();

  if(!d || !d._id){
    alert("Login Failed ❌");
    return;
  }

  userId = d._id;
  alert("Login Success ✅");

  loadNotes();

 }catch(e){
  alert("Login Error ❌");
  console.log(e);
 }
}

// ✅ SAVE NOTE
async function saveNote(){
 try{
  await fetch(BASE + '/notes',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     userId,
     title: title.value,
     body: body.value
   })
  });

  alert("Note Saved ✅");
  loadNotes();

 }catch(e){
  alert("Save Error ❌");
  console.log(e);
 }
}

// ✅ LOAD NOTES
async function loadNotes(){
 try{
  const r = await fetch(BASE + '/notes/' + userId);
  const d = await r.json();

  notes.innerHTML = d.map(n => `<p>${n.title}</p>`).join("");

 }catch(e){
  console.log(e);
 }
}

// ✅ AI CHAT
async function sendMsg(){
 try{
  const msg = chatInput.value;

  const r = await fetch(BASE + '/chat',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({ msg })
  });

  const d = await r.json();

  const reply = d?.choices?.[0]?.message?.content || "No reply";

  chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;
  chat.innerHTML += `<p><b>AI:</b> ${reply}</p>`;

 }catch(e){
  alert("AI Error ❌");
  console.log(e);
 }
}

</script>

</body>
</html>
