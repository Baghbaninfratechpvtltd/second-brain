<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>AI Second Brain Pro 🧠</title>
  <style>
    /* Purana CSS rakhein aur ye naye add karein */
    .feature-bar { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn-small { padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 5px; border: none; background: #7c3aed; color: white; }
    .reminder-box { background: #2a2a4a; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
    .msg.ai { position: relative; }
    .speak-btn { font-size: 16px; cursor: pointer; margin-left: 10px; }
    #preview { max-width: 100px; display: none; border-radius: 5px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Second Brain 🧠</h1>
    
    <div class="feature-bar">
      <button class="btn-small" onclick="document.getElementById('fileInput').click()">📸 Photo</button>
      <button class="btn-small" onclick="toggleReminder()">⏰ Reminder</button>
      <button class="btn-small" onclick="clearChat()">🧹 Clear</button>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
    <img id="preview" />

    <div id="reminderBox" class="reminder-box">
      <input type="datetime-local" id="reminderTime">
      <input type="text" id="reminderTask" placeholder="Kya yaad dilana hai?">
      <button class="btn-small" onclick="setReminder()">Set</button>
    </div>

    <div id="chatBox" class="card" style="height: 400px; overflow-y: auto;"></div>
    
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Kuch bhi pucho ya translate karo...">
      <button onclick="sendMsg()">Bhejo</button>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let selectedImage = null;

    // --- Voice Feature ---
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'hi-IN'; // Hindi voice
      window.speechSynthesis.speak(utterance);
    }

    // --- Photo Preview ---
    function previewImage(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function() {
        selectedImage = reader.result;
        document.getElementById('preview').src = selectedImage;
        document.getElementById('preview').style.display = 'block';
      }
      reader.readAsDataURL(file);
    }

    // --- Reminder Logic ---
    function toggleReminder() {
      const box = document.getElementById('reminderBox');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function setReminder() {
      const time = new Date(document.getElementById('reminderTime').value).getTime();
      const task = document.getElementById('reminderTask').value;
      const now = new Date().getTime();

      if (time > now) {
        setTimeout(() => {
          alert("⏰ REMINDER: " + task);
          speak("Yaad dila rahi hoon: " + task);
        }, time - now);
        alert("Reminder set ho gaya!");
        toggleReminder();
      }
    }

    async function sendMsg() {
      const input = document.getElementById("userInput");
      const msg = input.value;
      if (!msg && !selectedImage) return;

      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += `<div class="msg user"><b>Aap:</b> ${msg}</div>`;
      
      input.value = "";
      const currentImg = selectedImage;
      selectedImage = null;
      document.getElementById('preview').style.display = 'none';

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ msg, history: chatHistory, imageBase64: currentImg })
        });
        const data = await res.json();
        
        chatBox.innerHTML += `
          <div class="msg ai">
            <b>AI:</b> ${data.reply} 
            <span class="speak-btn" onclick="speak('${data.reply.replace(/'/g, "")}')">🔊</span>
          </div>`;
        chatHistory.push({ role: "user", text: msg }, { role: "model", text: data.reply });
      } catch (e) {
        chatBox.innerHTML += `<div class="msg ai" style="color:red">Error!</div>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
