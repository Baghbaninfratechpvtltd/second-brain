<!DOCTYPE html>
<html>
<head>
<title>Second Brain</title>
<link rel="manifest" href="manifest.json">
</head>
<body>

<h2>Signup</h2>
<input id="semail"><input id="spass">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="email"><input id="pass">
<button onclick="login()">Login</button>

<h2>Notes</h2>
<input id="title"><textarea id="body"></textarea>
<button onclick="saveNote()">Save</button>

<div id="notes"></div>

<h2>AI</h2>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

<script>

const BASE = "https://second-brain-98s0.onrender.com";
let userId="";

async function signup(){
 await fetch(BASE+'/signup',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({email:semail.value,password:spass.value})
 });
 alert("done");
}

async function login(){
 const r=await fetch(BASE+'/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({email:email.value,password:pass.value})
 });
 const d=await r.json();
 userId=d._id;
 loadNotes();
}

async function saveNote(){
 await fetch(BASE+'/notes',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({userId,title:title.value,body:body.value})
 });
 loadNotes();
}

async function loadNotes(){
 const r=await fetch(BASE+'/notes/'+userId);
 const d=await r.json();
 notes.innerHTML=d.map(n=>n.title).join("<br>");
}

async function sendMsg(){
 const msg=chatInput.value;
 const r=await fetch(BASE+'/chat',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({msg})
 });
 const d=await r.json();
 chat.innerHTML+= "<br>"+d.choices[0].message.content;
}

</script>

</body>
</html>
