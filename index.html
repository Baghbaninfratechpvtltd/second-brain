<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain 🧠</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* Aapka Original CSS */
    body { font-family: sans-serif; background: #0f0f1a; color: #e0e0e0; margin: 0; padding: 10px; }
    .container { max-width: 600px; margin: auto; }
    .card { background: #1a1a2e; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 8px; }
    .ai { background: #2a2a4a; position: relative; }
    .user { background: #7c3aed; text-align: right; }
    input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
    button { padding: 10px; background: #7c3aed; color: white; border: none; border-radius: 5px; cursor: pointer; }
    
    /* New Features Style */
    .features { display: flex; gap: 10px; margin-bottom: 10px; }
    .speak-btn { cursor: pointer; font-size: 1.2rem; margin-left: 10px; vertical-align: middle; }
    #preview { max-width: 100px; display: none; margin: 10px 0; border: 2px solid #7c3aed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Second Brain 🧠</h1>
    
    <div class="features">
      <button onclick="document.getElementById('imgInp').click()">📸 Photo</button>
      <button onclick="setReminder()">⏰ Reminder</button>
      <button onclick="location.reload()">🔄 Refresh</button>
    </div>

    <input type="file" id="imgInp" hidden accept="image/*" onchange="showPrev(event)">
    <img id="preview" />

    <div id="chatBox" class="card" style="height: 400px; overflow-y: auto;">
      <div class="msg ai">AI: Namaste! Main aapka assistant hoon. 🔊</div>
    </div>

    <div class="card">
      <input type="text" id="userInput" placeholder="Kuch pucho ya Translate karo...">
      <button onclick="sendMsg()">Bhejo</button>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let imgData = null;

    // 🔊 Voice Function
    function speak(text) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'hi-IN';
      window.speechSynthesis.speak(msg);
    }

    // 📸 Photo Preview
    function showPrev(e) {
      const reader = new FileReader();
      reader.onload = () => {
        imgData = reader.result;
        document.getElementById('preview').src = imgData;
        document.getElementById('preview').style.display = 'block';
      };
      reader.readAsDataURL(e.target.files[0]);
    }

    // ⏰ Reminder Function
    function setReminder() {
      const task = prompt("Kya yaad dilana hai?");
      const mins = prompt("Kitne minute baad? (sirf number)");
      if(task && mins) {
        alert(`Theek hai, ${mins} min baad yaad dilaunga.`);
        setTimeout(() => {
          alert("⏰ REMINDER: " + task);
          speak("Reminder: " + task);
        }, mins * 60000);
      }
    }

    // 💬 Send Message
    async function sendMsg() {
      const inp = document.getElementById("userInput");
      const msg = inp.value;
      if(!msg && !imgData) return;

      const box = document.getElementById("chatBox");
      box.innerHTML += `<div class="msg user">${msg}</div>`;
      
      const currentImg = imgData;
      imgData = null;
      document.getElementById('preview').style.display = 'none';
      inp.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ msg, history: chatHistory, imageBase64: currentImg })
        });
        const data = await res.json();
        const reply = data.reply || "Error aa gaya";

        box.innerHTML += `
          <div class="msg ai">
            ${marked.parse(reply)}
            <span class="speak-btn" onclick="speak(\`${reply.replace(/`/g, "")}\`)">🔊</span>
          </div>`;
        
        chatHistory.push({role:"user", text:msg}, {role:"model", text:reply});
        box.scrollTop = box.scrollHeight;
      } catch (e) {
        box.innerHTML += `<div class="msg ai" style="color:red">AI busy hai, baad mein try karein.</div>`;
      }
    }
  </script>
</body>
</html>
