<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain 🧠</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* AAPKA ORIGINAL DESIGN */
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .msg-area { height: 450px; overflow-y: auto; padding: 15px; border-radius: 8px; background: #0f0f1a; border: 1px solid #2a2a4a; }
    .bubble { display: inline-block; padding: 12px 18px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; line-height: 1.5; }
    .user { text-align: right; } .user .bubble { background: #7c3aed; color: white; }
    .ai { text-align: left; } .ai .bubble { background: #2a2a4a; color: #e0e0e0; position: relative; }
    .input-group { display: flex; gap: 10px; margin-top: 15px; }
    input[type="text"] { flex: 1; padding: 12px; background: #1a1a2e; border: 1px solid #2a2a4a; color: white; border-radius: 8px; }
    button { padding: 12px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    button:hover { background: #6d28d9; }
    
    /* NEW UI ELEMENTS */
    .voice-btn { cursor: pointer; margin-left: 8px; font-size: 1.1rem; filter: grayscale(1); transition: 0.2s; }
    .voice-btn:hover { filter: grayscale(0); transform: scale(1.2); }
    .btn-row { display: flex; gap: 10px; margin-bottom: 12px; }
    #prevImg { max-width: 120px; display: none; margin-bottom: 15px; border: 2px solid #7c3aed; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Second Brain 🧠</h1>
    <p style="text-align:center; color:#666; margin-bottom:20px;">AI + Notes + Voice + Vision</p>

    <div class="btn-row">
      <button onclick="document.getElementById('fileInput').click()" style="background:#3b82f6;">📸 Photo</button>
      <button onclick="setAlarm()" style="background:#ef4444;">⏰ Reminder</button>
      <button onclick="location.reload()" style="background:#10b981;">🔄 Refresh</button>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*" onchange="showPreview(event)">
    <img id="prevImg" />

    <div class="card">
      <div id="chatBox" class="msg-area">
        <div class="msg ai"><div class="bubble">Namaste! Main aapka Second Brain hoon. Kuch bhi puchiye ya translate karwaiye. 🔊</div></div>
      </div>
      <div class="input-group">
        <input type="text" id="userInput" placeholder="Yahan likhein...">
        <button onclick="sendMsg()">Bhejo</button>
      </div>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let base64Img = null;

    // 🔊 Voice (Bolne wala feature)
    function speak(text) {
      const synth = window.speechSynthesis;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'hi-IN'; 
      synth.speak(utter);
    }

    // 📸 Photo Preview
    function showPreview(e) {
      const reader = new FileReader();
      reader.onload = () => {
        base64Img = reader.result;
        document.getElementById('prevImg').src = base64Img;
        document.getElementById('prevImg').style.display = 'block';
      };
      reader.readAsDataURL(e.target.files[0]);
    }

    // ⏰ Reminder/Alarm Logic
    function setAlarm() {
      const task = prompt("Kya yaad dilana hai?");
      const mins = prompt("Kitne minute baad? (Sirf number likhein)");
      if(task && mins) {
        alert(`${mins} minute ka reminder set ho gaya.`);
        setTimeout(() => {
          alert("⏰ ALARM: " + task);
          speak("Reminder: " + task);
        }, mins * 60000);
      }
    }

    // 💬 Send Message
    async function sendMsg() {
      const input = document.getElementById("userInput");
      const msg = input.value;
      if(!msg && !base64Img) return;

      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
      
      const tempImg = base64Img;
      base64Img = null;
      document.getElementById('prevImg').style.display = 'none';
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ msg, history: chatHistory, imageBase64: tempImg })
        });
        const data = await res.json();
        const reply = data.reply || "Maaf kijiye, error aaya.";

        chatBox.innerHTML += `
          <div class="msg ai">
            <div class="bubble">
              ${marked.parse(reply)}
              <span class="voice-btn" onclick="speak(\`${reply.replace(/[`']/g, "")}\`)">🔊</span>
            </div>
          </div>`;
        
        chatHistory.push({role: "user", text: msg}, {role: "model", text: reply});
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (e) {
        chatBox.innerHTML += `<div class="msg ai"><div class="bubble" style="color:red;">❌ AI se connection nahi ho paya.</div></div>`;
      }
    }
  </script>
</body>
</html>
