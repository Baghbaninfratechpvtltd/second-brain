<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain 🧠</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* AAPKA ORIGINAL LAMBA CSS */
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .msg-area { height: 450px; overflow-y: auto; padding: 15px; border-radius: 8px; background: #0f0f1a; border: 1px solid #2a2a4a; }
    .bubble { display: inline-block; padding: 12px 18px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; }
    .user { text-align: right; } .user .bubble { background: #7c3aed; color: white; }
    .ai { text-align: left; } .ai .bubble { background: #2a2a4a; color: #e0e0e0; position: relative; }
    .input-group { display: flex; gap: 10px; margin-top: 15px; }
    input[type="text"] { flex: 1; padding: 12px; background: #1a1a2e; border: 1px solid #2a2a4a; color: white; border-radius: 8px; }
    button { padding: 12px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; }
    
    /* NEW FEATURES CSS */
    .voice-btn { cursor: pointer; margin-left: 8px; font-size: 1.2rem; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    #prevImg { max-width: 150px; display: none; margin-bottom: 15px; border-radius: 8px; border: 2px solid #7c3aed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Second Brain 🧠</h1>
    
    <div class="btn-row">
      <button onclick="document.getElementById('fileInp').click()" style="background:#3b82f6;">📸 Photo</button>
      <button onclick="setReminder()" style="background:#ef4444;">⏰ Reminder</button>
      <button onclick="location.reload()" style="background:#10b981;">🔄 Refresh</button>
    </div>

    <input type="file" id="fileInp" hidden accept="image/*" onchange="previewImg(event)">
    <img id="prevImg" />

    <div class="card">
      <div id="chatBox" class="msg-area">
        <div class="msg ai"><div class="bubble">Namaste! Main aapka AI hoon. Poochiye jo bhi chahiye! 🔊</div></div>
      </div>
      <div class="input-group">
        <input type="text" id="userInput" placeholder="Likhien yahan...">
        <button onclick="sendMsg()">Bhejo</button>
      </div>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let imgData = null;

    function speak(text) {
      const s = new SpeechSynthesisUtterance(text);
      s.lang = 'hi-IN';
      window.speechSynthesis.speak(s);
    }

    function previewImg(e) {
      const r = new FileReader();
      r.onload = () => {
        imgData = r.result;
        document.getElementById('prevImg').src = imgData;
        document.getElementById('prevImg').style.display = 'block';
      };
      r.readAsDataURL(e.target.files[0]);
    }

    function setReminder() {
      const t = prompt("Kya yaad dilana hai?");
      const m = prompt("Kitne minute baad?");
      if(t && m) {
        alert("Reminder set ho gaya!");
        setTimeout(() => {
          alert("⏰ ALARM: " + t);
          speak("Reminder: " + t);
        }, m * 60000);
      }
    }

    async function sendMsg() {
      const inp = document.getElementById("userInput");
      const msg = inp.value;
      if(!msg && !imgData) return;

      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
      
      const currentImg = imgData;
      imgData = null;
      document.getElementById('prevImg').style.display = 'none';
      inp.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ msg, history: chatHistory, imageBase64: currentImg })
        });
        const data = await res.json();
        const reply = data.reply || "Error aaya!";

        chatBox.innerHTML += `
          <div class="msg ai">
            <div class="bubble">
              ${marked.parse(reply)}
              <span class="voice-btn" onclick="speak(\`${reply.replace(/[`']/g, "")}\`)">🔊</span>
            </div>
          </div>`;
        
        chatHistory.push({role: "user", text: msg}, {role: "model", text: reply});
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (e) {
        chatBox.innerHTML += `<div class="msg ai"><div class="bubble">❌ Server offline hai.</div></div>`;
      }
    }
  </script>
</body>
</html>
