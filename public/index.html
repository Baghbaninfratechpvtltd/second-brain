<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain 🧠</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 6px; color: #a78bfa; }
    .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #a78bfa; }
    input, textarea {
      width: 100%; background: #0f0f1a; border: 1px solid #333;
      border-radius: 10px; padding: 12px 14px; color: #e0e0e0;
      font-size: 0.95rem; margin-bottom: 10px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #a78bfa; }
    textarea { resize: vertical; min-height: 80px; }
    button {
      background: #7c3aed; color: white; border: none;
      padding: 11px 22px; border-radius: 10px; cursor: pointer;
      font-size: 0.95rem; transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button.secondary { background: #1e1e3f; border: 1px solid #444; }
    button.secondary:hover { background: #2a2a5a; }
    button.danger { background: #7f1d1d; }
    button.danger:hover { background: #991b1b; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem;
    }
    .tab.active { background: #7c3aed; border-color: #7c3aed; }
    #authNav { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 0.85rem; color: #888; }
    #authNav button { padding: 6px 14px; font-size: 0.8rem; }
    #authMsg { margin-top: 10px; font-size: 0.85rem; }
    .note-item {
      background: #12122a; border: 1px solid #2a2a4a; border-radius: 12px;
      padding: 14px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
    }
    .note-item .note-content { flex: 1; }
    .note-item h3 { font-size: 0.95rem; color: #c4b5fd; margin-bottom: 4px; }
    .note-item p  { font-size: 0.85rem; color: #888; }
    .note-item button { padding: 6px 10px; font-size: 0.8rem; flex-shrink: 0; }
    #chatBox {
      background: #0d0d1f; border: 1px solid #2a2a4a;
      border-radius: 12px; height: 340px; overflow-y: auto; padding: 14px; margin-bottom: 12px;
    }
    .msg { margin-bottom: 16px; }
    .msg-label { font-size: 0.75rem; color: #666; margin-bottom: 4px; }
    .msg.user .bubble {
      background: #4c1d95; padding: 10px 14px;
      border-radius: 14px 14px 4px 14px;
      display: inline-block; max-width: 85%; line-height: 1.5;
    }
    .msg.ai .bubble {
      background: #1e1e3f; padding: 12px 16px;
      border-radius: 14px 14px 14px 4px;
      display: inline-block; max-width: 90%; line-height: 1.6; color: #ddd6fe;
    }
    .ai-md p  { margin-bottom: 8px; }
    .ai-md ul, .ai-md ol { margin: 8px 0 8px 20px; }
    .ai-md li { margin-bottom: 4px; }
    .ai-md h1,.ai-md h2,.ai-md h3 { color: #c4b5fd; margin: 12px 0 6px; }
    .ai-md code { background: #0d0d1f; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; color: #86efac; }
    .ai-md pre { background: #0d0d1f; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid #2a2a4a; }
    .ai-md pre code { background: none; padding: 0; }
    .ai-md strong { color: #e2d9f3; }
    .ai-md blockquote { border-left: 3px solid #7c3aed; padding-left: 12px; color: #999; margin: 8px 0; }
    .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .chat-top h2 { margin-bottom: 0; }
    .chat-top button { padding: 6px 12px; font-size: 0.8rem; }
    .chat-row { display: flex; gap: 8px; }
    .chat-row input { margin-bottom: 0; flex: 1; }
    .typing { color: #555; font-style: italic; font-size: 0.85rem; padding: 4px 0; }
  </style>
</head>
<body>
<div class="container">

  <h1>🧠 Second Brain</h1>
  <p class="subtitle">Notes + AI — Aapka apna personal knowledge hub</p>

  <div id="authNav">
    <span id="userLabel"></span>
    <button class="secondary" id="logoutBtn" onclick="logout()" style="display:none">Logout</button>
  </div>

  <div class="tabs" id="mainTabs" style="display:none">
    <div class="tab active" id="tabNotes" onclick="showTab('notes')">📝 Notes</div>
    <div class="tab"        id="tabChat"  onclick="showTab('chat')">🤖 AI Chat</div>
  </div>

  <!-- AUTH -->
  <div id="authSection">
    <div class="card">
      <h2>🔐 Login / Signup</h2>
      <div class="tabs" style="margin-bottom:16px">
        <div class="tab active" id="loginTabBtn"  onclick="switchAuth('login')">Login</div>
        <div class="tab"        id="signupTabBtn" onclick="switchAuth('signup')">Signup</div>
      </div>
      <input id="authEmail" type="email"    placeholder="Email address">
      <input id="authPass"  type="password" placeholder="Password">
      <div id="loginForm">
        <button onclick="login()" style="width:100%">Login →</button>
      </div>
      <div id="signupForm" style="display:none">
        <button onclick="signup()" style="width:100%">Account Banao →</button>
      </div>
      <div id="authMsg"></div>
    </div>
  </div>

  <!-- NOTES -->
  <div id="notesSection" style="display:none">
    <div class="card">
      <h2>📝 Naya Note</h2>
      <input    id="noteTitle" placeholder="Title likhein">
      <textarea id="noteBody"  placeholder="Yahan apne thoughts likhein..."></textarea>
      <button onclick="saveNote()">Save Note ✅</button>
    </div>
    <div class="card">
      <h2>📚 Aapke Notes</h2>
      <div id="notesList"><p style="color:#555">Koi note nahi hai abhi.</p></div>
    </div>
  </div>

  <!-- AI CHAT -->
  <div id="chatSection" style="display:none">
    <div class="card">
      <div class="chat-top">
        <h2>🤖 AI Chat</h2>
        <button class="secondary" onclick="clearChat()">🗑 Clear</button>
      </div>
      <div id="chatBox">
        <div class="msg ai">
          <div class="msg-label">AI 🤖</div>
          <div class="bubble ai-md">Namaste! Main aapka AI assistant hoon. Kuch bhi poochho! 😊</div>
        </div>
      </div>
      <div class="chat-row">
        <input id="chatInput" placeholder="Kuch bhi poochho..."
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
        <button onclick="sendMsg()">Send ➤</button>
      </div>
    </div>
  </div>

</div>

<script>
  const BASE = "https://second-brain-98s0.onrender.com";

  let token       = localStorage.getItem("sb_token") || "";
  let userEmail   = localStorage.getItem("sb_email") || "";
  let chatHistory = [];

  if (token) showApp();

  function showApp() {
    document.getElementById("authSection").style.display  = "none";
    document.getElementById("notesSection").style.display = "block";
    document.getElementById("chatSection").style.display  = "none";
    document.getElementById("mainTabs").style.display     = "flex";
    document.getElementById("userLabel").textContent      = "👤 " + userEmail;
    document.getElementById("logoutBtn").style.display    = "inline-block";
    loadNotes();
  }

  function switchAuth(mode) {
    document.getElementById("loginForm").style.display  = mode === "login"  ? "block" : "none";
    document.getElementById("signupForm").style.display = mode === "signup" ? "block" : "none";
    document.getElementById("loginTabBtn").classList.toggle("active",  mode === "login");
    document.getElementById("signupTabBtn").classList.toggle("active", mode === "signup");
    setMsg("", "");
  }

  function setMsg(msg, color) {
    const el = document.getElementById("authMsg");
    el.textContent = msg;
    el.style.color = color;
    el.style.marginTop = msg ? "10px" : "0";
  }

  async function signup() {
    const email    = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPass").value;
    if (!email || !password) return setMsg("❌ Email aur password chahiye!", "#f87171");
    try {
      const r = await fetch(BASE + "/signup", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (d.error) return setMsg("❌ " + d.error, "#f87171");
      setMsg("✅ Account ban gaya! Ab login karein.", "#4ade80");
      switchAuth("login");
    } catch { setMsg("❌ Server se connect nahi hua", "#f87171"); }
  }

  async function login() {
    const email    = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPass").value;
    if (!email || !password) return setMsg("❌ Email aur password chahiye!", "#f87171");
    try {
      const r = await fetch(BASE + "/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (d.error) return setMsg("❌ " + d.error, "#f87171");
      token = d.token; userEmail = d.email;
      localStorage.setItem("sb_token", token);
      localStorage.setItem("sb_email", userEmail);
      showApp();
    } catch { setMsg("❌ Server se connect nahi hua", "#f87171"); }
  }

  function logout() {
    token = ""; userEmail = "";
    localStorage.removeItem("sb_token");
    localStorage.removeItem("sb_email");
    location.reload();
  }

  function showTab(tab) {
    document.getElementById("notesSection").style.display = tab === "notes" ? "block" : "none";
    document.getElementById("chatSection").style.display  = tab === "chat"  ? "block" : "none";
    document.getElementById("tabNotes").classList.toggle("active", tab === "notes");
    document.getElementById("tabChat").classList.toggle("active",  tab === "chat");
  }

  async function saveNote() {
    const title = document.getElementById("noteTitle").value.trim();
    const body  = document.getElementById("noteBody").value.trim();
    if (!title) return alert("Title dalna zaroori hai!");
    try {
      const r = await fetch(BASE + "/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ title, body })
      });
      const d = await r.json();
      if (d.error) return alert("❌ " + d.error);
      document.getElementById("noteTitle").value = "";
      document.getElementById("noteBody").value  = "";
      loadNotes();
    } catch { alert("❌ Note save nahi hua"); }
  }

  async function loadNotes() {
    try {
      const r = await fetch(BASE + "/notes", {
        headers: { "Authorization": "Bearer " + token }
      });
      const notes = await r.json();
      const box   = document.getElementById("notesList");
      if (!Array.isArray(notes) || !notes.length) {
        box.innerHTML = '<p style="color:#555">Koi note nahi. Upar se add karein!</p>';
        return;
      }
      box.innerHTML = notes.map(n => `
        <div class="note-item">
          <div class="note-content">
            <h3>${esc(n.title)}</h3>
            ${n.body ? `<p>${esc(n.body.substring(0,120))}${n.body.length>120?"…":""}</p>` : ""}
          </div>
          <button class="danger" onclick="deleteNote('${n._id}')">🗑</button>
        </div>`).join("");
    } catch { console.log("Notes load error"); }
  }

  async function deleteNote(id) {
    if (!confirm("Note delete karna hai?")) return;
    try {
      await fetch(BASE + "/notes/" + id, {
        method: "DELETE", headers: { "Authorization": "Bearer " + token }
      });
      loadNotes();
    } catch { alert("❌ Delete nahi hua"); }
  }

  async function sendMsg() {
    const input = document.getElementById("chatInput");
    const msg   = input.value.trim();
    if (!msg) return;
    const chatBox = document.getElementById("chatBox");
    input.value = "";

    chatBox.innerHTML += `
      <div class="msg user">
        <div class="msg-label" style="text-align:right">Aap</div>
        <div style="text-align:right"><div class="bubble">${esc(msg)}</div></div>
      </div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    const tid = "t_" + Date.now();
    chatBox.innerHTML += `<div id="${tid}" class="typing">⏳ AI soch raha hai...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const r = await fetch(BASE + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ msg, history: chatHistory })
      });
      const d = await r.json();
      document.getElementById(tid)?.remove();

      const reply = d.reply || d.error || "Koi jawab nahi mila.";
      chatHistory.push({ role: "user",  text: msg   });
      chatHistory.push({ role: "model", text: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

      const html = typeof marked !== "undefined" ? marked.parse(reply) : esc(reply);
      chatBox.innerHTML += `
        <div class="msg ai">
          <div class="msg-label">AI 🤖</div>
          <div class="bubble ai-md">${html}</div>
        </div>`;
    } catch {
      document.getElementById(tid)?.remove();
      chatBox.innerHTML += `<div class="msg ai"><div class="bubble" style="color:#f87171">❌ AI se connection fail</div></div>`;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function clearChat() {
    chatHistory = [];
    document.getElementById("chatBox").innerHTML = `
      <div class="msg ai">
        <div class="msg-label">AI 🤖</div>
        <div class="bubble ai-md">Chat clear! Nayi baat karte hain 😊</div>
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
      .replace(/\n/g,"<br>");
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }
</script>
</body>
</html>
