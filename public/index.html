<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FIXED META -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Second Brain 🧠</title>

  <!-- FIXED ICON -->
  <link rel="icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#7c3aed">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    body{font-family:sans-serif;background:#0a0a14;color:white}
    .tab{padding:10px;background:#222;margin:5px;cursor:pointer;display:inline-block}
    .tab.active{background:purple}
    .section{display:none;padding:20px}
  </style>
</head>

<body>

<!-- TABS -->
<div>
  <div class="tab active" id="t1" onclick="showTab('dashboard')">Home</div>
  <div class="tab" id="t2" onclick="showTab('notes')">Notes</div>
  <div class="tab" id="t3" onclick="showTab('chat')">AI</div>
  <div class="tab" id="t4" onclick="showTab('tasks')">Tasks</div>
  <div class="tab" id="t5" onclick="showTab('reminder')">Reminder</div>
  <div class="tab" id="t6" onclick="showTab('translate')">Translate</div>
  <div class="tab" id="t7" onclick="showTab('ocr')">OCR</div>
  <div class="tab" id="t8" onclick="showTab('news')">News</div>
</div>

<!-- SECTIONS -->
<div id="dashSection" class="section" style="display:block">🏠 Home Section</div>
<div id="notesSection" class="section">📝 Notes Section</div>
<div id="chatSection" class="section">🤖 AI Section</div>
<div id="tasksSection" class="section">✅ Tasks Section</div>
<div id="reminderSection" class="section">🔔 Reminder Section</div>
<div id="translateSection" class="section">🌐 Translate Section</div>
<div id="ocrSection" class="section">📸 OCR Section</div>

<!-- ✅ FIXED NEWS SECTION -->
<div id="newsSection" class="section">
  <h2>📰 Latest News</h2>

  <input id="newsQuery" placeholder="Search news..." />
  <button onclick="fetchNews()">Search</button>

  <div id="newsList">Search karke news dekho</div>
</div>

<script>

// ✅ FIXED SAFE showTab
function showTab(tab){

  const sections={
    dashboard:"dashSection",
    notes:"notesSection",
    chat:"chatSection",
    tasks:"tasksSection",
    reminder:"reminderSection",
    translate:"translateSection",
    ocr:"ocrSection",
    news:"newsSection"
  };

  const tabs={
    dashboard:"t1",
    notes:"t2",
    chat:"t3",
    tasks:"t4",
    reminder:"t5",
    translate:"t6",
    ocr:"t7",
    news:"t8"
  };

  // hide all
  Object.values(sections).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display="none";
  });

  // remove active
  Object.values(tabs).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove("active");
  });

  // show selected
  if(document.getElementById(sections[tab]))
    document.getElementById(sections[tab]).style.display="block";

  if(document.getElementById(tabs[tab]))
    document.getElementById(tabs[tab]).classList.add("active");
}


// Dummy news (test ke liye)
function fetchNews(){
  document.getElementById("newsList").innerHTML = "📰 News load ho gayi (API connect hone ke baad real aayegi)";
}

</script>

</body>
</html>
