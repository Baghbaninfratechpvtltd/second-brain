<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain 🧠</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #chatBox { width: 95%; max-width: 600px; height: 70vh; border: 1px solid #333; overflow-y: auto; margin-bottom: 10px; padding: 15px; background: #1a1a2e; border-radius: 12px; }
        .msg { margin-bottom: 15px; display: flex; flex-direction: column; }
        .user { align-items: flex-end; }
        .ai { align-items: flex-start; }
        .bubble { padding: 12px; border-radius: 10px; max-width: 85%; background: #2a2a4a; }
        .user .bubble { background: #7c3aed; }
        .input-area { display: flex; gap: 10px; width: 95%; max-width: 600px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0d0d1f; color: white; }
        button { padding: 10px 20px; background: #7c3aed; border: none; color: white; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🧠 Second Brain</h2>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Bhejo</button>
    </div>

    <script>
        async function sendMsg() {
            const input = document.getElementById("userInput");
            const msg = input.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Relative URL use kar rahe hain taaki 404 na aaye
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ msg })
                });

                const data = await res.json();
                const reply = data.reply || "Error: " + (data.error || "Failed");

                chatBox.innerHTML += `<div class="msg ai"><div class="bubble">${marked.parse(reply)}</div></div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg ai"><div class="bubble">Connection Error!</div></div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
