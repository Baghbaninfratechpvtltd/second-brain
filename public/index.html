<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain 🧠</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chatBox { width: 100%; max-width: 600px; height: 400px; border: 1px solid #333; overflow-y: auto; margin-bottom: 10px; padding: 10px; background: #1a1a2e; border-radius: 10px; }
        .msg { margin-bottom: 15px; }
        .user { text-align: right; }
        .ai { text-align: left; }
        .bubble { display: inline-block; padding: 10px; border-radius: 10px; max-width: 80%; }
        .user .bubble { background: #7c3aed; }
        .ai .bubble { background: #2a2a4a; }
        .input-area { display: flex; gap: 10px; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #0d0d1f; color: white; }
        button { padding: 10px 20px; background: #7c3aed; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🧠 Second Brain</h1>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Yahan likhein...">
        <button onclick="sendMsg()">Bhejo</button>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        let chatHistory = [];

        async function sendMsg() {
            const input = document.getElementById("userInput");
            const msg = input.value;
            if (!msg) return;

            chatBox.innerHTML += `<div class="msg user"><div class="bubble">${msg}</div></div>`;
            input.value = "";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ msg, history: chatHistory })
                });

                const data = await res.json();
                const reply = data.reply || "Error!";

                chatBox.innerHTML += `<div class="msg ai"><div class="bubble">${marked.parse(reply)}</div></div>`;
                chatHistory.push({ role: "user", text: msg }, { role: "model", text: reply });
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg ai"><div class="bubble">Server se connect nahi ho saka.</div></div>`;
            }
        }
    </script>
</body>
</html>
