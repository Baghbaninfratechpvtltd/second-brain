<!DOCTYPE html>
<html>
<head>
<title>Second Brain Pro</title>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>

<style>
body{
  background:linear-gradient(135deg,#0f0f1a,#1a1a2e);
  color:#fff;
  font-family:system-ui;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#111;
  border:1px solid #444;
  border-radius:10px;
  color:#fff;
}

button{
  padding:10px;
  background:#7c6aff;
  border:none;
  border-radius:10px;
  color:#fff;
  margin:3px;
}

#notes div{
  background:#1e1e3f;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.chat{
  background:#14142a;
  height:200px;
  overflow:auto;
  padding:10px;
}

#graph{
  height:300px;
  background:#111;
}
</style>

</head>
<body>

<h2>Signup</h2>
<input id="semail">
<input id="spass">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="email">
<input id="pass">
<button onclick="login()">Login</button>

<hr>

<h2>Notes</h2>
<input id="title">
<textarea id="body"></textarea>
<button onclick="saveNote()">Save</button>

<div id="notes"></div>

<hr>

<h2>🧠 Brain Graph</h2>
<div id="graph"></div>

<hr>

<h2>🤖 AI Chat</h2>
<div class="chat" id="chat"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>

let userId = '';
const BASE = "https://second-brain-98s0.onrender.com";

// Signup
async function signup(){
  await fetch(BASE+'/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:semail.value,
      password:spass.value
    })
  });
  alert("Signup done");
}

// Login
async function login(){
  const res = await fetch(BASE+'/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:email.value,
      password:pass.value
    })
  });

  const data = await res.json();
  userId = data?._id;
  loadNotes();
}

// Save Note
async function saveNote(){
  await fetch(BASE+'/notes',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      userId,
      title:title.value,
      body:body.value
    })
  });

  loadNotes();
}

// Load Notes + Graph
async function loadNotes(){
  const res = await fetch(BASE+'/notes/'+userId);
  const data = await res.json();

  notes.innerHTML = data.map(n=>`<div>${n.title}</div>`).join('');

  const nodes = data.map((n,i)=>({id:i,label:n.title}));
  const edges = [];

  data.forEach((n,i)=>{
    data.forEach((m,j)=>{
      if(i!==j && m.title.includes(n.title.split(" ")[0])){
        edges.push({from:i,to:j});
      }
    });
  });

  new vis.Network(document.getElementById('graph'),{nodes,edges},{});
}

// AI Chat (with memory)
async function sendMsg(){
  const msg = chatInput.value;

  const res = await fetch(BASE+'/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      msg,
      userId
    })
  });

  const data = await res.json();

  chat.innerHTML += `<div>👤 ${msg}</div>`;
  chat.innerHTML += `<div>🤖 ${data.choices?.[0]?.message?.content || 'Error'}</div>`;
}

// 🎤 Voice AI
const recognition = new webkitSpeechRecognition();
recognition.lang = "en-IN";

function startVoice(){
  recognition.start();
}

recognition.onresult = function(e){
  chatInput.value = e.results[0][0].transcript;
  sendMsg();
}

</script>

</body>
</html>
