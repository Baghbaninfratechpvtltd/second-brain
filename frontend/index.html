<!DOCTYPE html>
<html>
<head>
<title>Second Brain</title>

<style>
body{background:#0b0b14;color:#fff;font-family:system-ui}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#111;border:1px solid #333;border-radius:8px}
button{padding:10px;background:#7c6aff;border:none;border-radius:8px;color:#fff}
#notes div{background:#1c1c35;padding:10px;margin:5px;border-radius:8px}
.chat{background:#14142a;padding:10px;height:200px;overflow:auto;border-radius:10px}
</style>

</head>
<body>

<h2>Signup</h2>
<input id="semail" placeholder="Email">
<input id="spass" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Notes</h2>
<input id="title" placeholder="Title">
<textarea id="body"></textarea>
<button onclick="saveNote()">Save</button>

<div id="notes"></div>

<hr>

<h2>🤖 AI Chat</h2>
<div class="chat" id="chat"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>

let userId = '';
const BASE = "https://second-brain-98s0.onrender.com";

// 🔐 Signup
async function signup(){
  await fetch(BASE+'/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:semail.value,
      password:spass.value
    })
  });
  alert("Signup done");
}

// 🔐 Login
async function login(){
  const res = await fetch(BASE+'/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email:email.value,
      password:pass.value
    })
  });

  const data = await res.json();
  userId = data?._id;
  loadNotes();
}

// 📝 Save Note + Auto link
async function saveNote(){
  await fetch(BASE+'/notes',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      userId,
      title:title.value,
      body:body.value
    })
  });

  loadNotes();
}

// 📥 Load Notes
async function loadNotes(){
  const res = await fetch(BASE+'/notes/'+userId);
  const data = await res.json();

  notes.innerHTML = data.map(n=>`<div>${n.title}</div>`).join('');
}

// 🤖 AI Chat
async function sendMsg(){
  const msg = chatInput.value;

  const res = await fetch(BASE+'/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({msg})
  });

  const data = await res.json();

  chat.innerHTML += `<div>👤 ${msg}</div>`;
  chat.innerHTML += `<div>🤖 ${data.choices?.[0]?.message?.content || 'Error'}</div>`;
}

// 🎤 Voice
const recognition = new webkitSpeechRecognition();
recognition.lang = "en-IN";

function startVoice(){
  recognition.start();
}

recognition.onresult = function(e){
  chatInput.value = e.results[0][0].transcript;
  sendMsg();
}

</script>

</body>
</html>
